
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- CDN ổn định -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4"></script>
</head>

<body>

<h2>AI Demo</h2>
<button onclick="init()">Start</button>
<div id="webcam-container"></div>

<script>
const URL = "./";

async function init() {
  const model = await tmImage.load(URL + "model.json", URL + "metadata.json");

  const webcam = new tmImage.Webcam(200, 200, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam-container").appendChild(webcam.canvas);
}
</script>

</body>
</html>
