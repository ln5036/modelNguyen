<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- FIX CDN -->
  <script src="https://unpkg.com/@tensorflow/tfjs@4.6.0/dist/tf.min.js"></script>
  <script src="https://unpkg.com/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>
</head>

<body>

<button onclick="init()">Start</button>
<div id="webcam-container"></div>

<script>
const URL = "./";

async function init() {
  console.log("tmImage:", typeof tmImage);

  if (typeof tmImage === "undefined") {
    alert("tmImage chưa load!");
    return;
  }

  const model = await tmImage.load(URL + "model.json", URL + "metadata.json");

  const webcam = new tmImage.Webcam(200, 200, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam-container").appendChild(webcam.canvas);
}
</script>

</body>
</html>
